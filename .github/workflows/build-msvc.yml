name: Build (MSVC)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Configure
        run: cmake --preset msvc

      - name: Build
        run: cmake --build --preset msvc

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-msvc
          path: build_msvc/
